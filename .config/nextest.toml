[profile.default]
# Limit test threads to reduce memory/disk usage
test-threads = 4

# Reduce retries to save disk space
retries = 0

# Run tests serially in each binary to reduce memory
max-fail = 10

[profile.ci]
# CI-specific profile with aggressive disk space optimization
test-threads = 2
retries = 1

# Fail fast to avoid wasting resources
fail-fast = false

# Show output for all tests
status-level = "all"

# Set slower timeout for CI runners
slow-timeout = { period = "120s", terminate-after = 3 }

[store]
# Reduce disk usage by not storing test output
dir = "target/nextest"

[test-groups]
# Group slow tests together to better manage resources
default = { max-threads = 4 }
