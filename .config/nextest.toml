# Opt into setup scripts (used by the `sandbox` profile to start one shared
# out-of-band neard before node-backed tests).
experimental = ["setup-scripts"]

[profile.default]
# Limit test threads to reduce memory/disk usage
test-threads = 4

# Reduce retries to save disk space
retries = 0

# Run tests serially in each binary to reduce memory
max-fail = 10

[profile.ci]
# CI-specific profile balancing disk space and performance
test-threads = 6
retries = 1
default-filter = "not test(/^requires_network_/)"

# Fail fast to avoid wasting resources
fail-fast = false

# Show output for failed tests only to reduce log size
status-level = "fail"

# Set slower timeout for CI runners
slow-timeout = { period = "120s", terminate-after = 3 }

# Node-backed tests: share one out-of-band `neard` instead of booting one per
# test. The setup script starts the node and exports NEAR_SANDBOX_RPC_URL +
# TEST_CONTRACTS_PREBUILT into the test environment. Run via
# `just test-sandbox` (which guarantees teardown), or
# `cargo nextest run --profile sandbox --run-ignored all`.
[scripts.setup.sandbox]
command = "script/sandbox-up.sh"

[profile.sandbox]
# Parallel across a pool of neard nodes: the setup script (script/sandbox-up.sh)
# starts one node per slot and each test attaches to the node for its
# NEXTEST_TEST_GLOBAL_SLOT. Exclusive use per slot keeps fast_forward and chain
# state isolated between concurrent tests, while reusing a node across the tests
# that pass through its slot avoids per-test boot. test-threads MUST be <=
# SANDBOX_NODE_COUNT (default 4; keep them in sync, lower both on tight runners).
test-threads = 4
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.sandbox.scripts]]
filter = "all()"
setup = "sandbox"

[store]
# Reduce disk usage by not storing test output
dir = "target/nextest"
