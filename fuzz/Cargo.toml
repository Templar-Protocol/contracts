# fuzz_liquidator_logic removed: it was a toy reimplementation testing only
# harness arithmetic (P1). Its real counterpart is the off-chain
# `ProfitabilityCalculator` in the `templar-liquidator` crate, which pulls a
# full async stack (tokio/reqwest/jsonrpc) — not worth dragging into a
# libFuzzer binary for an off-chain, non-fund-critical pure function. On-chain
# liquidation amounts are covered by `fuzz_liquidations`. Tracked: ENG-344.

