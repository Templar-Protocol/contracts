[package]
edition.workspace = true
license.workspace = true
name = "templar-fuzz"
publish = false
repository.workspace = true
version = "0.0.0"

[dependencies]
arbitrary.workspace = true
hex-literal.workspace = true
libfuzzer-sys.workspace = true
near-sdk = { workspace = true, features = ["non-contract-usage"] }
primitive-types.workspace = true
templar-common = { workspace = true, features = ["non-contract-usage"] }
templar-vault-kernel = { path = "../contract/vault/kernel", features = ["postcard", "soroban"] }
templar-curator-primitives = { path = "../contract/vault/curator-primitives", features = ["postcard"] }
templar-soroban-runtime = { path = "../contract/vault/soroban", features = ["testutils"] }

[lints]
workspace = true

[package.metadata]
cargo-fuzz = true

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "fuzz_borrow_invariants"
path = "fuzz_targets/fuzz_borrow_invariants.rs"
test = false
bench = false

[[bin]]
name = "fuzz_borrow"
path = "fuzz_targets/fuzz_borrow.rs"
test = false
bench = false

[[bin]]
