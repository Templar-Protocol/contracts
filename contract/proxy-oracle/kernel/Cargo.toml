[package]
name = "templar-proxy-oracle-kernel"
license.workspace = true
repository.workspace = true
edition.workspace = true
version = "0.1.0"

[dependencies]
borsh = { version = "1.5", default-features = false, features = ["derive", "unstable__schema"], optional = true }
hex = { version =  "0.4", default-features = false, features = ["alloc"], optional = true }
serde = { version = "1", default-features = false, features = ["alloc", "derive"], optional = true }
schemars = { version = "0.8", default-features = false, features = ["derive"], optional = true }
templar-primitives = { path = "../../../primitives", default-features = false, features = [] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Keep getrandom/custom available in the standalone kernel wasm feature-matrix check.
# Without this, primitive-types' rand path hits getrandom's wasm32-unknown-unknown guard.
getrandom = { version = "0.2", default-features = false, features = ["custom"] }

[dev-dependencies]
hex-literal.workspace = true
rstest.workspace = true
serde_json.workspace = true
tokio.workspace = true
test-utils.workspace = true

[lints]
workspace = true

[features]
default = []
std = ["templar-primitives/std", "borsh?/std", "hex?/std", "serde?/std"]
borsh = ["dep:borsh", "templar-primitives/borsh"]
schemars = ["std", "dep:schemars", "schemars/derive", "templar-primitives/schemars"]
serde = ["dep:hex", "dep:serde", "hex/serde", "templar-primitives/serde"]
