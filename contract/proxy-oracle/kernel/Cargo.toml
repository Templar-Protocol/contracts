[package]
name = "templar-proxy-oracle-kernel"
license.workspace = true
repository.workspace = true
edition.workspace = true
version = "0.1.0"

[dependencies]
borsh = { workspace = true, default-features = false, features = [], optional = true }
hex = { workspace = true, default-features = false, features = ["alloc"], optional = true }
serde = { workspace = true, default-features = false, features = ["alloc", "derive"], optional = true }
schemars = { workspace = true, default-features = false, optional = true }
templar-primitives = { workspace = true, default-features = false, features = [] }
thiserror = { workspace = true, default-features = false, features = [] }

[dev-dependencies]
hex-literal.workspace = true
near-sdk = { workspace = true, features = ["unit-testing"] }
near-workspaces.workspace = true
rstest.workspace = true
tokio.workspace = true
test-utils.workspace = true

[lints]
workspace = true

[features]
default = ["std", "borsh", "serde", "schemars"]
std = ["templar-primitives/std", "borsh/std", "hex/std", "serde/std", "thiserror/std"]
borsh = ["dep:borsh"]
schemars = ["std", "dep:schemars"]
serde = ["dep:hex", "dep:serde"]
