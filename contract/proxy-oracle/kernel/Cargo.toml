[package]
name = "templar-proxy-oracle-kernel"
license.workspace = true
repository.workspace = true
edition.workspace = true
version = "0.1.0"

[dependencies]
borsh = { version = "1.5", default-features = false, features = ["derive", "unstable__schema"], optional = true }
hex = { version =  "0.4", default-features = false, features = ["alloc"], optional = true }
near-sdk = { workspace = true, optional = true, features = ["non-contract-usage"] }
serde = { version = "1", default-features = false, features = ["alloc", "derive"], optional = true }
schemars = { version = "0.8", default-features = false, features = ["derive"], optional = true }
templar-primitives = { workspace = true, features = [] }
thiserror = { version = "2", default-features = false, features = [] }

[dev-dependencies]
hex-literal.workspace = true
near-sdk = { workspace = true, features = ["unit-testing"] }
near-workspaces.workspace = true
rstest.workspace = true
tokio.workspace = true
test-utils.workspace = true

[lints]
workspace = true

[features]
default = []
std = ["templar-primitives/std", "borsh/std", "hex/std", "serde/std", "thiserror/std"]
borsh = ["dep:borsh", "templar-primitives/borsh"]
schemars = ["std", "dep:schemars", "schemars/derive", "templar-primitives/schemars"]
serde = ["dep:hex", "dep:serde", "hex/serde", "templar-primitives/serde"]
near = ["std", "borsh", "serde", "schemars", "dep:near-sdk", "templar-primitives/near"]
