[package]
name = "templar-proxy-oracle-soroban-contract"
license.workspace = true
repository.workspace = true
edition.workspace = true
version = "0.1.0"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
postcard = { version = "1", default-features = false, features = ["alloc"] }
soroban-sdk = { version = "25.0.1", features = ["alloc"] }
stellar-access = "0.7.1"
stellar-macros = "0.7.1"
templar-primitives = { path = "../../../../primitives", default-features = false, features = ["serde"] }
templar-proxy-oracle-kernel = { path = "../../kernel", features = ["serde"] }
templar-proxy-oracle-soroban-common = { path = "../common" }

[dev-dependencies]
soroban-sdk = { version = "25.0.1", features = ["testutils", "alloc"] }

[lints]
workspace = true
