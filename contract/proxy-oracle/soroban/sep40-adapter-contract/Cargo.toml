[package]
name = "templar-proxy-oracle-soroban-sep40-adapter-contract"
license.workspace = true
repository.workspace = true
edition.workspace = true
version = "0.1.0"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.0.1", features = ["alloc"] }
stellar-access = "0.7.1"
stellar-macros = "0.7.1"
templar-proxy-oracle-soroban-common = { path = "../common" }

[dev-dependencies]
soroban-sdk = { version = "25.0.1", features = ["testutils", "alloc"] }
templar-proxy-oracle-soroban-sep40-adapter-contract = { path = ".", features = ["testutils"] }
templar-proxy-oracle-soroban-contract = { path = "../contract", features = ["testutils"] }

[lints]
workspace = true
