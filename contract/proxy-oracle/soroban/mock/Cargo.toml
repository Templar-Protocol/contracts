[package]
name = "templar-proxy-oracle-soroban-mock"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.0.1", features = ["alloc"] }

[dev-dependencies]
soroban-sdk = { version = "25.0.1", features = ["alloc", "testutils"] }
