[package]
name = "templar-4626-proxy-soroban"
version = "1.0.0"
edition = "2021"
license = "GPL-3.0-only"
description = "Stub Soroban ERC-4626 proxy contract for Templar Protocol"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"
doctest = false

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.3.0", features = ["alloc"] }
templar-soroban-shared-types = { path = "../shared-types" }
templar-vault-kernel = { path = "../../kernel", features = ["postcard", "soroban"] }
templar-curator-primitives = { path = "../../curator-primitives", features = ["postcard"] }

[dev-dependencies]
soroban-sdk = { version = "25.3.0", features = ["testutils", "alloc"] }
templar-soroban-governance = { path = "../governance" }
templar-soroban-runtime = { path = "..", features = ["testutils"] }
