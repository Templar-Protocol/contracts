[package]
name = "templar-soroban-runtime"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Soroban effect interpreter and runtime for Templar Protocol vaults"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[features]
default = []
std = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
# Core dependency - vault kernel types
templar-vault-kernel = { path = "../kernel", features = ["borsh"] }

# Curator primitives for policy and recovery
templar-curator-primitives = { path = "../curator-primitives", features = ["borsh"] }
derive_more.workspace = true
borsh = { version = "1.5", default-features = false, features = ["derive"] }

# Soroban SDK for Stellar smart contracts
soroban-sdk = { version = "23.5.1", features = ["alloc"] }

# OpenZeppelin Stellar Contracts — Pausable and Upgradeable utilities
stellar-contract-utils.workspace = true

[dev-dependencies]
proptest = "1.4"
soroban-sdk = { version = "23.5.1", features = ["testutils", "alloc"] }
rstest.workspace = true
