[package]
name = "templar-soroban-governance"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Timelocked governance executor for the Soroban vault"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"
doctest = false

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.0.1", features = ["alloc"] }
templar-curator-primitives = { path = "../../curator-primitives" }
templar-vault-kernel = { path = "../../kernel" }
templar-soroban-shared-types = { path = "../shared-types" }
postcard = { version = "1", default-features = false, features = ["alloc"] }

[dev-dependencies]
soroban-sdk = { version = "25.0.1", features = ["testutils", "alloc"] }
