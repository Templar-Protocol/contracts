[package]
name = "templar-soroban-hot-bridge-adapter"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Soroban market adapter contract for HOT bridge routing"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"
doctest = false

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.3.0", features = ["experimental_spec_shaking_v2", "hazmat-address"] }
stellar-contract-utils.workspace = true

[dev-dependencies]
soroban-sdk = { version = "25.3.0", features = ["testutils", "experimental_spec_shaking_v2"] }
