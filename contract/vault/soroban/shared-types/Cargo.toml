[package]
name = "templar-soroban-shared-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Shared Soroban ABI selector types for Templar vault contracts"

[lib]
crate-type = ["rlib"]
path = "src/lib.rs"

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "25.0.1", features = ["alloc"] }
