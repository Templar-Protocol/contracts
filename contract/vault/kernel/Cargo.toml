[package]
name = "templar-vault-kernel"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
path = "src/lib.rs"

[features]
default = []
# NEAR-specific effect variants (ExternalCall/ChargeStorage).
near = []
# Optional serialization helpers (no_std + alloc).
borsh = ["dep:borsh"]
postcard = ["dep:postcard", "serde"]
# Enable Borsh schema generation (adds code size, only needed for NEAR).
borsh-schema = ["borsh", "borsh/unstable__schema"]
serde = ["dep:serde"]
schemars = ["dep:schemars"]
# Strip KernelEvent Serialize/Clone for minimal WASM size in Soroban builds.
soroban = []
# kani feature flag for conditional compilation of Kani harnesses
# Note: Kani verifier is run via `cargo kani`, not as a library dependency
kani = []

# ── Action handler gates ──────────────────────────────────────────
# Enum variants are always present (borsh compat); only the handler
# functions and their apply_action dispatch are gated.  Disabled arms
# return KernelError::NotImplemented.
#
# AbortAllocating, AbortRefreshing, AbortWithdrawing, EmergencyReset
action-recovery = []
# SyncExternalAssets
action-sync-external = []
# RefreshFees
action-refresh-fees = []
# Convenience: enable every optional action handler.
all-actions = ["action-recovery", "action-sync-external", "action-refresh-fees"]

[dependencies]
derive_more.workspace = true
primitive-types = { version = "0.14.0", default-features = false }

borsh = { version = "1.5", optional = true, default-features = false, features = ["derive"] }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "alloc"] }
postcard = { version = "1", optional = true, default-features = false, features = ["alloc"] }
schemars = { version = "0.8", optional = true }

[dev-dependencies]
proptest = "1.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
