[package]
name = "templar-vault-kernel"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
path = "src/lib.rs"

[features]
default = []
near = ["dep:near-sdk", "dep:borsh", "dep:serde", "dep:schemars"]

[dependencies]
primitive-types = { version = "0.14.0", default-features = false }

borsh = { version = "1.5", optional = true, default-features = true, features = ["unstable__schema"] }
serde = { version = "1.0", optional = true, features = ["derive"] }
schemars = { version = "0.8", optional = true }
near-sdk = { version = "5.17.2", optional = true, features = ["unstable", "non-contract-usage"] }

[dev-dependencies]
proptest = "1.4"
