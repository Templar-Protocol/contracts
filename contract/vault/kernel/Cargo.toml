[package]
name = "templar-vault-kernel"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
path = "src/lib.rs"

[features]
default = []
# NEAR-specific effect variants (ExternalCall/ChargeStorage).
near = []
# Optional serialization helpers (no_std + alloc).
borsh = ["dep:borsh"]
serde = ["dep:serde"]
schemars = ["dep:schemars"]
# kani feature flag for conditional compilation of Kani harnesses
# Note: Kani verifier is run via `cargo kani`, not as a library dependency
kani = []

[dependencies]
derive_more.workspace = true
primitive-types = { version = "0.14.0", default-features = false }

borsh = { version = "1.5", optional = true, default-features = false, features = ["derive", "unstable__schema"] }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "alloc"] }
schemars = { version = "0.8", optional = true }

[dev-dependencies]
proptest = "1.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
