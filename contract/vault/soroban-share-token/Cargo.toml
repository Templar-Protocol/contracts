[package]
name = "templar-soroban-share-token"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Vault-controlled share token for Soroban vault deployments"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"
doctest = false

[features]
default = []
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "23.5.1", features = ["alloc"] }

[dev-dependencies]
soroban-sdk = { version = "23.5.1", features = ["testutils", "alloc"] }
