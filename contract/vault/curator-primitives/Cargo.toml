[package]
name = "templar-curator-primitives"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Chain-agnostic curator policy and recovery primitives for Templar Protocol vaults"

[lib]
path = "src/lib.rs"

[features]
default = []
std = []
borsh = ["dep:borsh"]
serde = ["dep:serde"]
schemars = ["dep:schemars"]

[dependencies]
# Core dependency - vault kernel types
templar-vault-kernel = { path = "../kernel" }
derive_more.workspace = true
typed-builder = "0.20"

# Optional serialization dependencies (no_std + alloc)
borsh = { version = "1.5", optional = true, default-features = false, features = ["derive", "unstable__schema"] }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "alloc"] }
schemars = { version = "0.8", optional = true }

[dev-dependencies]
proptest = "1.4"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
