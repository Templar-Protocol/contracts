[package]
name = "templar-curator-primitives"
version = "1.0.0"
edition = "2021"
license = "MIT"
description = "Chain-agnostic curator policy and recovery primitives for Templar Protocol vaults"

[lib]
path = "src/lib.rs"

[features]
default = []
std = ["borsh-schema"]
borsh = ["dep:borsh", "templar-vault-kernel/borsh"]
borsh-schema = ["borsh", "borsh/unstable__schema", "templar-vault-kernel/borsh-schema"]
postcard = ["dep:postcard", "serde", "templar-vault-kernel/postcard"]
serde = ["dep:serde", "templar-vault-kernel/serde"]
schemars = ["dep:schemars", "templar-vault-kernel/schemars"]
boundary = ["dep:near-sdk", "borsh-schema", "serde"]
boundary-test = ["boundary", "near-sdk/unit-testing"]
# Recovery action helpers (determine_recovery_action, handle_*_failure, etc.)
recovery = []

[dependencies]
# Core dependency - vault kernel types
templar-vault-kernel = { path = "../kernel" }
templar-vault-macros.workspace = true
derive_more.workspace = true
typed-builder = "0.20"

# Optional serialization dependencies (no_std + alloc)
borsh = { version = "1.5", optional = true, default-features = false, features = ["derive"] }
serde = { version = "1.0", optional = true, default-features = false, features = ["derive", "alloc"] }
postcard = { version = "1", optional = true, default-features = false, features = ["alloc"] }
schemars = { version = "0.8", optional = true }
near-sdk = { workspace = true, optional = true }

[dev-dependencies]
proptest = "1.4"
rstest.workspace = true
