[package]
name = "templar-curator-primitives"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Chain-agnostic curator policy and recovery primitives for Templar Protocol vaults"

[lib]
path = "src/lib.rs"

[features]
default = []
std = []
near = ["dep:near-sdk", "dep:borsh", "dep:serde", "dep:schemars"]

[dependencies]
# Core dependency - vault kernel types
templar-vault-kernel = { path = "../kernel" }

# Optional NEAR dependencies
borsh = { version = "1.5", optional = true, default-features = true, features = ["unstable__schema"] }
serde = { version = "1.0", optional = true, features = ["derive"] }
schemars = { version = "0.8", optional = true }
near-sdk = { version = "5.17.2", optional = true, features = ["unstable"] }

[dev-dependencies]
