name: Setup Rust
description: Install Rust version and setup caching
inputs:
  targets:
    description: Rust targets to install
    required: false
    default: wasm32-unknown-unknown
  components:
    description: Rust components to install
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@1.85.0
      with:
        targets: ${{ inputs.targets }}
        components: ${{ inputs.components }}

    - uses: Swatinem/rust-cache@v2
      with:
        save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}
        # Exclude large build artifacts to reduce cache size
        cache-directories: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        # Don't cache target/debug or intermediate artifacts
        cache-targets: "false"
        # Add shared key to deduplicate cache across jobs
        shared-key: "rust-cache"
