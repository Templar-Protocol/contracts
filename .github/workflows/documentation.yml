name: Build & deploy documentation site to GitHub Pages
on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    name: Build documentation and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/rust

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install mdbook
        run: |
          mkdir bin
          readlink -f bin >> "$GITHUB_PATH"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz -o mdbook.tar.gz
          echo "084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d  mdbook.tar.gz" | sha256sum -c
          tar -xz -f mdbook.tar.gz --directory=bin
          rm mdbook.tar.gz

      - name: Build documentation
        run: ./script/build-docs.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
