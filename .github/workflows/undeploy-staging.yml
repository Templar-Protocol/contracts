name: Undeploy staging
on:
  pull_request:
    types: [closed]

jobs:
  cleanup-staging:
    name: Cleanup staging account
    runs-on: ubuntu-latest
    env:
      NEAR_CONTRACT_PR_STAGING_ACCOUNT_ID: gh-${{ github.event.number }}.${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install near CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/near-cli-rs/releases/download/v0.19.0/near-cli-rs-installer.sh | sh
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache init args
        id: cache-init-args
        uses: actions/cache@v4
        with:
          path: init-args.json
          key: ${{ env.NEAR_CONTRACT_PR_STAGING_ACCOUNT_ID }}-init-args
      - name: Generate init args
        if: steps.cache-init-args.outputs.cache-hit != 'true'
        run: cargo run --package test-utils --example generate_testnet_configuration > init-args.json
      - name: Recover and unregister tokens
        run: |
          BORROW_ID=$(cat init-args.json | jq -r '.configuration.borrow_asset.Nep141')
          if [ -n "$BORROW_ID" ]; then
            ./script/ci/recover-nep141.sh --account "${{ env.NEAR_CONTRACT_PR_STAGING_ACCOUNT_ID }}" \
              --token "$BORROW_ID" \
              --beneficiary "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_ID }}" \
              --network "${{ vars.NEAR_CONTRACT_STAGING_NETWORK }}" \
              --public-key "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_PUBLIC_KEY }}" \
              --private-key "${{ secrets.NEAR_CONTRACT_STAGING_ACCOUNT_PRIVATE_KEY }}"
          fi

          COLLATERAL_ID=$(cat init-args.json | jq -r '.configuration.collateral_asset.Nep141')
          if [ -n "$COLLATERAL_ID" ]; then
            ./script/ci/recover-nep141.sh --account "${{ env.NEAR_CONTRACT_PR_STAGING_ACCOUNT_ID }}" \
              --token "$COLLATERAL_ID" \
              --beneficiary "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_ID }}" \
              --network "${{ vars.NEAR_CONTRACT_STAGING_NETWORK }}" \
              --public-key "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_PUBLIC_KEY }}" \
              --private-key "${{ secrets.NEAR_CONTRACT_STAGING_ACCOUNT_PRIVATE_KEY }}"
          fi
      - name: Remove staging account
        run: |
          near account delete-account "${{ env.NEAR_CONTRACT_PR_STAGING_ACCOUNT_ID }}" \
            beneficiary "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_ID }}" \
            network-config "${{ vars.NEAR_CONTRACT_STAGING_NETWORK }}" \
            sign-with-plaintext-private-key \
              --signer-public-key "${{ vars.NEAR_CONTRACT_STAGING_ACCOUNT_PUBLIC_KEY }}" \
              --signer-private-key "${{ secrets.NEAR_CONTRACT_STAGING_ACCOUNT_PRIVATE_KEY }}" \
            send
