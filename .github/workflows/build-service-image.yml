name: Build Service Image
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "common/**"
      - "service/**"
      - "test-utils/**"
      - "universal-account/**"
  push:
    branches: [main, dev]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "common/**"
      - "service/**"
      - "test-utils/**"
      - "universal-account/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-service-image:
    name: Build Service Runtime Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: service/Dockerfile
          target: runtime
          tags: templar:${{ github.sha }}
          push: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
