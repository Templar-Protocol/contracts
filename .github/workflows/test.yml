name: Test
on:
  workflow_call:
    inputs:
      skip_coverage:
        description: 'Skip coverage job'
        required: false
        default: false
        type: boolean
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required for OIDC with Codecov

jobs:
  code-formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - run: cargo fmt --check

  code-linter:
    name: Code Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: ./.github/actions/rust
        with:
          components: clippy
      - name: Run cargo clippy
        env:
          SQLX_OFFLINE: true
        run: |
          cargo clippy --all-features --workspace --tests -- -D warnings

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: ./.github/actions/rust
      - name: Install cargo-nextest
        # https://nexte.st/docs/installation/pre-built-binaries/#linux-x86_64
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin
      - name: Install cargo-near
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/download/cargo-near-v0.16.1/cargo-near-installer.sh | sh
      - name: Run tests
        env:
          SQLX_OFFLINE: true
        run: ./script/test.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Skip coverage when called from other workflows with skip_coverage=true
    if: ${{ !inputs.skip_coverage }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/rust
        with:
          components: llvm-tools-preview

      - name: Install tools
        run: |
          # Install cargo-llvm-cov for coverage
          curl -LsSf https://github.com/taiki-e/cargo-llvm-cov/releases/latest/download/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz | tar xzf - -C ~/.cargo/bin
          
          # Install cargo-nextest for faster testing
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ~/.cargo/bin
          
          # Install cargo-near for contract building
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/download/cargo-near-v0.16.1/cargo-near-installer.sh | sh

      - name: Setup test environment
        run: |
          # Prebuild test contracts
          ./script/prebuild-test-contracts.sh
          
          # Create empty .env file if it doesn't exist (for compose)
          touch service/relayer/.env
          
          # Start database for relayer tests
          docker compose --file service/relayer/compose.dev.yaml up postgres --detach

      - name: Run tests with coverage
        env:
          SQLX_OFFLINE: true
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Cinstrument-coverage"
        run: |
          # Generate coverage report
          cargo llvm-cov nextest --lcov --output-path coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          flags: unittests
          name: templar-protocol-coverage
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Cleanup
        if: always()
        run: docker compose --file service/relayer/compose.dev.yaml down
