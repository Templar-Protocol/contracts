name: Test
on:
  workflow_call:
    inputs:
      skip_coverage:
        description: "Skip coverage job"
        required: false
        default: false
        type: boolean
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # Required for OIDC with Codecov

jobs:
  code-formatting:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - run: cargo fmt --check

  code-linter:
    name: Code Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/rust
        with:
          components: clippy
      - name: Run cargo clippy
        env:
          SQLX_OFFLINE: true
        run: |
          cargo clippy --all-features --workspace --tests \
            --exclude templar-soroban-blend-adapter \
            --exclude templar-soroban-governance \
            --exclude templar-soroban-runtime \
            --exclude templar-soroban-share-token \
            --exclude templar-soroban-shared-types \
            -- -D warnings

  soroban-code-linter:
    name: Soroban Code Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install Soroban lint Rust toolchain
        uses: dtolnay/rust-toolchain@193d6aa1dbbc28bd2c0a6b0e327cfdce68baaf6e
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none
          components: clippy
      - name: Run Soroban cargo clippy
        env:
          RUSTUP_TOOLCHAIN: 1.89.0
          SQLX_OFFLINE: true
        run: |
          cargo clippy --all-features --tests \
            -p templar-soroban-blend-adapter \
            -p templar-soroban-governance \
            -p templar-soroban-runtime \
            -p templar-soroban-share-token \
            -p templar-soroban-shared-types \
            -- -D warnings

  soroban:
    name: Soroban
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Soroban Rust toolchain
        uses: dtolnay/rust-toolchain@193d6aa1dbbc28bd2c0a6b0e327cfdce68baaf6e
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Install tools
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46
        with:
          tool: just,nextest

      - name: Run Soroban contract tests
        env:
          RUSTUP_TOOLCHAIN: 1.89.0
          SQLX_OFFLINE: true
        run: |
          cargo nextest run \
            -p templar-soroban-runtime \
            -p templar-soroban-governance \
            -p templar-soroban-share-token \
            -p templar-soroban-blend-adapter

      - name: Install packages
        run: sudo apt install libdbus-1-dev libudev-dev pkg-config

      - name: Install stellar CLI
        run: contract/vault/soroban/scripts/install-stellar-cli.sh

      - name: Enforce Soroban runtime size budget
        run: just -f contract/vault/soroban/justfile size-budget-check

      # Curator primitives feature matrix (Soroban-related)
      - name: Check curator-primitives (default)
        run: cargo check -p templar-curator-primitives

      - name: Check curator-primitives (std)
        run: cargo check -p templar-curator-primitives --no-default-features --features std

      - name: Check curator-primitives (serde-borsh)
        run: cargo check -p templar-curator-primitives --no-default-features --features borsh,serde,schemars,std

      - name: Check curator-primitives (boundary/wasm)
        run: cargo check -p templar-curator-primitives --no-default-features --features boundary,std --target wasm32-unknown-unknown

      - name: Test curator-primitives (boundary)
        run: cargo test -p templar-curator-primitives --no-default-features --features boundary-test,std

  soroban-proxy-oracle:
    name: Soroban Proxy Oracle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/rust
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Install tools
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46
        with:
          tool: just,nextest

      - name: Run proxy-oracle Soroban runtime tests
        run: cargo nextest run -p templar-proxy-oracle-soroban-contract

      - name: Run proxy-oracle Soroban governance tests
        run: cargo nextest run -p templar-proxy-oracle-soroban-governance-contract

      - name: Run proxy-oracle Soroban SEP-40 adapter tests
        run: cargo nextest run -p templar-proxy-oracle-soroban-sep40-adapter-contract

      - name: Install packages
        run: sudo apt install libdbus-1-dev libudev-dev pkg-config

      - name: Install stellar CLI
        run: contract/vault/soroban/scripts/install-stellar-cli.sh

      - name: Build and optimize proxy-oracle Soroban WASMs
        run: just -f contract/proxy-oracle/soroban/justfile optimize

      - name: Enforce proxy-oracle Soroban size budget (runtime)
        run: |
          python3 contract/proxy-oracle/soroban/scripts/check_wasm_budget.py \
            --wasm target/proxy-oracle-soroban/wasm/templar_proxy_oracle_soroban_contract.optimized.wasm \
            --max-bytes 131072

      - name: Enforce proxy-oracle Soroban size budget (governance)
        run: |
          python3 contract/proxy-oracle/soroban/scripts/check_wasm_budget.py \
            --wasm target/proxy-oracle-soroban/wasm/templar_proxy_oracle_soroban_governance_contract.optimized.wasm \
            --max-bytes 131072

      - name: Enforce proxy-oracle Soroban size budget (sep40-adapter)
        run: |
          python3 contract/proxy-oracle/soroban/scripts/check_wasm_budget.py \
            --wasm target/proxy-oracle-soroban/wasm/templar_proxy_oracle_soroban_sep40_adapter_contract.optimized.wasm \
            --max-bytes 32768

  feature-matrix:
    name: Feature Matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep this as an explicit curated list rather than a Cartesian product.
        # The crates need different commands, feature sets, and one row needs a
        # wasm target, so include-rows stay clearer than generate-and-exclude.
        include:
          - name: primitives std
            package: templar-primitives
            cargo_command: test
            features: std

          - name: primitives serde
            package: templar-primitives
            cargo_command: check
            features: serde,std

          - name: primitives borsh
            package: templar-primitives
            cargo_command: check
            features: borsh,std

          - name: primitives schemars
            package: templar-primitives
            cargo_command: check
            features: schemars,std

          - name: primitives near
            package: templar-primitives
            cargo_command: check
            features: near
            target: wasm32-unknown-unknown

          - name: primitives redstone
            package: templar-primitives
            cargo_command: check
            features: redstone,std

          - name: primitives full-serialization
            package: templar-primitives
            cargo_command: check
            features: borsh,serde,schemars,std

          - name: proxy-oracle-kernel std
            package: templar-proxy-oracle-kernel
            cargo_command: test
            features: std

          - name: proxy-oracle-kernel borsh
            package: templar-proxy-oracle-kernel
            cargo_command: check
            features: borsh,std

          - name: proxy-oracle-kernel serde
            package: templar-proxy-oracle-kernel
            cargo_command: check
            features: serde,std

          - name: proxy-oracle-kernel schemars
            package: templar-proxy-oracle-kernel
            cargo_command: check
            features: schemars,std

          - name: proxy-oracle-kernel serialization-set
            package: templar-proxy-oracle-kernel
            cargo_command: test
            features: borsh,serde,schemars,std

          - name: proxy-oracle-kernel full wasm32
            package: templar-proxy-oracle-kernel
            cargo_command: check
            features: borsh,serde,schemars,std
            target: wasm32-unknown-unknown
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/rust

      - name: Run feature matrix command
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          command=(
            cargo
            ${{ matrix.cargo_command }}
            -p
            ${{ matrix.package }}
            --no-default-features
            --features
            "${{ matrix.features }}"
          )

          if [ -n "$MATRIX_TARGET" ]; then
            command+=(--target "$MATRIX_TARGET")
          fi

          "${command[@]}"

  tests:
    name: Tests
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/rust

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46
        with:
          tool: nextest

      - name: Install cargo-near
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/cargo-near/releases/download/cargo-near-v0.16.1/cargo-near-installer.sh | sh

      - name: Run tests
        env:
          SQLX_OFFLINE: true
          # Use nextest CI profile with reduced parallelism
          NEXTEST_PROFILE: ci
          # Optimize cargo build for faster compilation
          CARGO_TERM_COLOR: always
          CARGO_INCREMENTAL: 0
        run: |
          # Soroban crates require their dedicated toolchain and are tested in the
          # Soroban job. Keep the default workspace test pass on rust-toolchain.toml.
          ./script/test.sh --workspace \
            --exclude templar-soroban-blend-adapter \
            --exclude templar-soroban-governance \
            --exclude templar-soroban-runtime \
            --exclude templar-soroban-share-token \
            --exclude templar-soroban-shared-types

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker compose --file ./service/relayer/compose.dev.yaml down -v || true
          docker system prune -af --volumes || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Skip coverage when called from other workflows with skip_coverage=true
    if: ${{ !inputs.skip_coverage }}
    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove large pre-installed packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # Remove unnecessary packages
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          # Clean Docker
          sudo docker image prune --all --force
          sudo docker system prune --all --volumes --force

          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/rust
        with:
          components: llvm-tools-preview

      - name: Install tools
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46
        with:
          tool: cargo-llvm-cov,nextest

      - name: Run tests with coverage
        env:
          SQLX_OFFLINE: true
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: "-Cinstrument-coverage"
          CARGO_BUILD_JOBS: 2
          # Use nextest CI profile with optimized parallelism
          NEXTEST_PROFILE: ci
          CARGO_TERM_COLOR: always
        run: |
          # --lib: unit tests only (excludes slow WASM integration tests).
          # Soroban crates are tested in the dedicated Soroban job with their
          # newer toolchain; exclude them from the default 1.86 coverage build.
          cargo llvm-cov nextest --workspace --lib --lcov --output-path coverage.lcov \
            --exclude templar-soroban-blend-adapter \
            --exclude templar-soroban-governance \
            --exclude templar-soroban-runtime \
            --exclude templar-soroban-share-token \
            --exclude templar-soroban-shared-types

          # Aggressive cleanup to free disk space
          echo "Cleaning up build artifacts..."
          rm -rf target/llvm-cov-target/*/debug/deps/*.profraw 2>/dev/null || true
          rm -rf target/llvm-cov-target/*/debug/incremental 2>/dev/null || true
          rm -rf target/llvm-cov-target/*/debug/build 2>/dev/null || true
          rm -rf target/debug/incremental 2>/dev/null || true
          rm -rf target/debug/build 2>/dev/null || true

          # Remove unnecessary cargo cache
          rm -rf ~/.cargo/registry/index
          rm -rf ~/.cargo/registry/cache
          rm -rf ~/.cargo/git/db

          echo "Disk space after cleanup:"
          df -h

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe
        with:
          files: coverage.lcov
          flags: unittests
          name: templar-protocol-coverage
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
