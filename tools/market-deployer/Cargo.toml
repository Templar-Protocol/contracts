[package]
name = "market-deployer"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
license.workspace = true

[lib]
name = "market_deployer"
path = "src/lib.rs"

[[bin]]
name = "market-deployer"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
base64.workspace = true
borsh.workspace = true
clap.workspace = true
near-crypto.workspace = true
near-fetch.workspace = true
near-primitives.workspace = true
near-sdk = { workspace = true, features = ["non-contract-usage"] }
serde.workspace = true
serde_json.workspace = true
templar-common = { workspace = true, features = ["non-contract-usage", "rpc"] }
templar-tools-common.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }

[lints]
workspace = true
