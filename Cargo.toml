[workspace]
resolver = "2"
members = ["bots", "common", "contract/*", "mock/*", "test-utils"]
package.license = "MIT"

[workspace.dependencies]
anyhow = "1.0.95"
async-trait = "0.1.88"
base64 = "0.22.1"
borsh = { version = "1.5", features = ["unstable__schema"] }
clap = { version = "4.5.23", features = ["derive", "env"] }
futures = "0.3.31"
getrandom = { version = "0.2", features = ["custom"] }
hex = { version = "0.4.3", features = ["serde"] }
hex-literal = "0.4"
near-contract-standards = "5.7"
near-crypto = "0.28.0"
near-jsonrpc-client = "0.16.0"
near-jsonrpc-primitives = "0.28.0"
near-primitives = "0.28.0"
near-sdk = { version = "5.7", features = ["unstable"] }
near-sdk-contract-tools = { git = "https://github.com/near/near-sdk-contract-tools", branch = "140-nep-245-multitoken-component" }
near-workspaces = { version = "0.16", features = ["unstable"] }
primitive-types = { version = "0.10.1" }
rstest = { version = "0.24" }
schemars = { version = "0.8" }
templar-common = { path = "./common" }
test-utils = { path = "./test-utils" }
thiserror = "2.0.11"
tokio = { version = "1.30.0", features = ["full"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
must_use_candidate = "allow"
large_futures = "allow"
redundant_closure_for_method_calls = "allow"
module_name_repetitions = "allow"
unwrap_used = "warn"
expect_used = "warn"
large_digit_groups = "warn"
missing_panics_doc = "allow"
wildcard_imports = "warn"

[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
# Tell `rustc` to optimize for small code size.
opt-level = "z"
lto = true
debug = false
panic = "abort"
# Opt into extra safety checks on arithmetic operations https://stackoverflow.com/a/64136471/249801
overflow-checks = true
