[package]
name = "templar-funding-bridge"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "funding-bridge"
path = "src/main.rs"

[lib]
name = "templar_funding_bridge"
path = "src/lib.rs"

[[example]]
name = "test_real_api"
path = "examples/test_real_api.rs"

[dependencies]
# Workspace dependencies
templar-common = { path = "../../common" }

# HTTP server
axum = "0.7"
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Metrics
prometheus = "0.13"
lazy_static = "1.4"

# NEAR (non-contract usage)
near-sdk = { version = "5.5", features = ["unstable", "non-contract-usage"] }
near-crypto = "0.26"
near-primitives = "0.26"
near-jsonrpc-client = "0.13"
near-jsonrpc-primitives = "0.26"

# Cryptography and encoding (for NEAR Intents integration)
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
bs58 = "0.5"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"

# Ethereum client (for automated deposits)
ethers = { version = "2.0", features = ["abigen", "ws"], optional = true }

# Solana client (for automated SPL token deposits)
# Using v3.0.0 which has modular dependencies and resolved zeroize conflicts
solana-sdk = { version = "3.0", default-features = true, optional = true }
solana-rpc-client = { version = "3.1", optional = true }
spl-token = { version = "7.0", default-features = false, optional = true }
spl-associated-token-account = { version = "6.0", default-features = false, optional = true }

# Utilities
ulid = "1.1"
hex = "0.4"

[features]
default = []
ethereum = ["dep:ethers"]
solana = ["dep:solana-sdk", "dep:solana-rpc-client", "dep:spl-token", "dep:spl-associated-token-account"]

[dev-dependencies]
axum-test = "15.0"
# Testing
near-workspaces = "0.14"
wiremock = "0.6"
tokio-test = "0.4"
