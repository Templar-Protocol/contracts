[package]
name = "templar-funding-bridge"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
license.workspace = true

[[bin]]
name = "funding-bridge"
path = "src/main.rs"

[lib]
name = "templar_funding_bridge"
path = "src/lib.rs"

[dependencies]
# Workspace dependencies
templar-common.workspace = true

# HTTP server
axum.workspace = true
tower = { workspace = true, features = ["util"] }
tower-http = { workspace = true, features = ["cors", "trace"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }
async-trait.workspace = true

# HTTP client
reqwest = { workspace = true, features = ["json"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

# CLI
clap = { workspace = true, features = ["derive", "env"] }

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }

# Metrics
prometheus = "0.13"
lazy_static = "1.4"

# NEAR (non-contract usage)
near-sdk = { workspace = true, features = ["unstable", "non-contract-usage"] }
near-crypto.workspace = true
near-primitives.workspace = true
near-jsonrpc-client.workspace = true
near-jsonrpc-primitives.workspace = true
borsh.workspace = true

# Cryptography and encoding (for NEAR Intents integration)
base64.workspace = true
chrono = { workspace = true, features = ["serde"] }
sha2.workspace = true
bs58.workspace = true
ed25519-dalek = { workspace = true, features = ["rand_core"] }
rand = "0.8"

# Ethereum client (for automated deposits)
ethers = { version = "2.0", features = ["abigen", "ws"] }

# Solana client (for automated SPL token deposits)
# Using v3.0.0 which has modular dependencies and resolved zeroize conflicts
solana-sdk = { workspace = true, default-features = true }
solana-rpc-client = { version = "3.1" }
spl-token = { version = "7.0", default-features = false }
spl-associated-token-account = { version = "6.0", default-features = false }

# Stellar client (for automated Stellar asset deposits and withdrawals)
stellar-strkey.workspace = true
stellar-base = "0.7"
# For Soroban smart contract interactions
stellar-xdr = { version = "26.0", default-features = false, features = ["curr", "std"] }

# Utilities
ulid = "1.1"
hex.workspace = true

[dev-dependencies]
axum-test = "20.0"
# Testing
near-workspaces.workspace = true
wiremock.workspace = true
tokio-test = "0.4"
