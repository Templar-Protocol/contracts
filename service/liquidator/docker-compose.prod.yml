services:
  liquidator:
    image: templar-liquidator:latest
    container_name: templar-liquidator-prod
    restart: always

    env_file:
      - .env

    environment:
      - RUST_LOG=info,templar_liquidator=info
      - RUST_BACKTRACE=0

    command: [
      "--network", "${NETWORK:-mainnet}",
      "--signer-account", "${SIGNER_ACCOUNT_ID}",
      "--signer-key", "${SIGNER_KEY}",
      "--registries", "${REGISTRY_ACCOUNT_IDS:-v1.tmplr.near}",
      "--liquidation-strategy", "${LIQUIDATION_STRATEGY:-partial}",
      "--partial-percentage", "${PARTIAL_LIQUIDATION_PERCENTAGE:-50}",
      "--min-profit-bps", "${MIN_PROFIT_BPS:-50}",
      "--liquidation-scan-interval", "${LIQUIDATION_SCAN_INTERVAL:-600}",
      "--registry-refresh-interval", "${REGISTRY_REFRESH_INTERVAL:-3600}",
      "--concurrency", "${CONCURRENCY:-10}",
      "--transaction-timeout", "${TRANSACTION_TIMEOUT:-60}",
      "--collateral-strategy", "${COLLATERAL_STRATEGY:-hold}",
      "--max-loop-iterations", "${MAX_LOOP_ITERATIONS:-10}"
      # Uncomment to enable loop liquidation (repeatedly liquidate until healthy):
      # "--loop-liquidation",
      # "--fixed-liquidation-amount", "${FIXED_LIQUIDATION_AMOUNT}",
      # "--oneclick-api-token", "${ONECLICK_API_TOKEN}",
      # "--ref-contract", "${REF_CONTRACT:-v2.ref-finance.near}"
    ]

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"

    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-x", "liquidator"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
