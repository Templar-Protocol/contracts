[package]
name = "templar-liquidator"
edition.workspace = true
license.workspace = true
repository.workspace = true
version = "0.1.0"

[lib]
path = "src/liquidator.rs"

[[bin]]
name = "liquidator"
path = "src/main.rs"

[dependencies]
async-trait = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
clap = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
near-account-id = { workspace = true }
near-api = { workspace = true }
near-crypto = { workspace = true }
near-jsonrpc-client = { workspace = true }
near-sdk = { workspace = true, features = ["non-contract-usage"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
templar-common = { workspace = true, features = ["rpc"] }
templar-gateway-client = { workspace = true, features = ["clap"] }
templar-gateway-core = { workspace = true }
templar-gateway-methods-spec = { workspace = true }
templar-gateway-types = { workspace = true }
templar-proxy-oracle-near-common = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
templar-gateway-testing = { workspace = true }
test-utils = { workspace = true }

[lints]
workspace = true
